<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Favorites
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Favorites</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid *ngIf="photoService.favoritePhotos.length > 0; else emptyState">
    <ion-row>
      <ion-col size="6" *ngFor="let photo of photoService.favoritePhotos" class="favorite-card">
        <button
          class="unfavorite-button"
          type="button"
          (click)="onUnfavorite($event, photo)"
          (touchend)="onUnfavorite($event, photo)">
          <ion-icon name="heart"></ion-icon>
        </button>
        <img class="favorite-photo" [src]="photo.webviewPath" alt="Favorite photo" />
      </ion-col>
    </ion-row>
  </ion-grid>

  <ng-template #emptyState>
    <div class="empty-state">
      <h2>No favorites yet</h2>
      <p>Tap the heart on any photo in Photos to add it here.</p>
    </div>
  </ng-template>
</ion-content>
